<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#141218">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Skincare">
  <title>Skincare Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">

  <!-- Material Symbols icon font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500&family=Roboto:wght@300;400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">

    <!-- Top App Bar -->
    <header class="top-bar">
      <h1 id="top-bar-title">Skincare</h1>
      <div class="date-chip" id="top-date"></div>
      <button onclick="AppSettings.open()" aria-label="Settings"
        style="background:none;border:none;cursor:pointer;padding:6px;
          color:var(--md-sys-color-on-surface-variant);display:flex;align-items:center;
          border-radius:var(--md-sys-shape-corner-full);-webkit-tap-highlight-color:transparent;">
        <span class="material-symbols-rounded" style="font-size:22px;">settings</span>
      </button>
    </header>

    <!-- Screens -->
    <main>
      <section class="screen active" id="screen-home"></section>
      <section class="screen"        id="screen-streaks"></section>
      <section class="screen"        id="screen-products"></section>
      <section class="screen"        id="screen-journal"></section>
      <section class="screen"        id="screen-schedule"></section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" id="nav-home" aria-label="Home">
        <div class="nav-indicator"></div>
        <span class="material-symbols-rounded">home</span>
        <span class="label">Home</span>
      </button>
      <button class="nav-item" id="nav-streaks" aria-label="Streaks">
        <div class="nav-indicator"></div>
        <span class="material-symbols-rounded">local_fire_department</span>
        <span class="label">Streaks</span>
      </button>
      <button class="nav-item" id="nav-products" aria-label="Products">
        <div class="nav-indicator"></div>
        <span class="material-symbols-rounded">science</span>
        <span class="label">Products</span>
      </button>
      <button class="nav-item" id="nav-journal" aria-label="Journal">
        <div class="nav-indicator"></div>
        <span class="material-symbols-rounded">auto_stories</span>
        <span class="label">Journal</span>
      </button>
      <button class="nav-item" id="nav-schedule" aria-label="Schedule">
        <div class="nav-indicator"></div>
        <span class="material-symbols-rounded">calendar_month</span>
        <span class="label">Schedule</span>
      </button>
    </nav>

  </div>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar" role="status" aria-live="polite"></div>

  <script>
    // Date chip (runs immediately, no JS needed)
    document.getElementById('top-date').textContent =
      new Date().toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
  </script>

  <!-- Load order: db → screens → router -->
  <script src="js/db.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/home.js"></script>
  <script src="js/streaks.js"></script>
  <script src="js/products.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
